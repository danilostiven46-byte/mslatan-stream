<!DOCTYPE html>
<html lang="es">
<head>
<link rel="icon" type="image/png" href="/assets/faviconTop.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopStreaming | Acceso</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at top left, rgba(16,185,129,0.25), transparent 40%),
    radial-gradient(circle at bottom right, rgba(59,130,246,0.25), transparent 40%),
    #020617;

  color: white;
}

/* HEADER */
.top-link {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 14px;
  opacity: 0.8;
  text-decoration: none;
  color: white;
}

/* CONTENEDOR */
.container {
  width: 100%;
  max-width: 420px;
  padding: 32px 28px;
  border-radius: 26px;

  background: rgba(10,15,25,0.45);
  backdrop-filter: blur(18px);

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 30px 80px rgba(0,0,0,0.7),
    0 0 40px rgba(16,185,129,0.08);

  text-align: center;

  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(25px);}
  to {opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo {
  width: 170px;
  margin-bottom: 12px;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6));
}

/* TITULOS */
h1 {
  font-size: 1.9rem;
  margin-bottom: 6px;
  font-weight: 700;
}

p {
  color: #94a3b8;
  font-size: 0.95rem;
}

/* INPUT */
.input {
  margin-top: 22px;
  width: 100%;
  padding: 16px;
  border-radius: 14px;

  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);

  color: white;
  text-align: center;

  font-size: 1.35rem;
  letter-spacing: 0.45em;

  outline: none;
}

.input:focus {
  border-color: #10b981;
  box-shadow: 0 0 0 4px rgba(16,185,129,0.25);
}

/* BOTON */
.btn {
  margin-top: 18px;
  width: 100%;
  padding: 14px;

  border-radius: 14px;
  border: none;

  background: linear-gradient(135deg, #10b981, #3b82f6);

  color: white;
  font-weight: 700;

  cursor: pointer;
  transition: 0.25s;
}

.btn:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* BOTON WHATSAPP */
.btn-wsp {
  margin-top: 14px;
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.06);
  color: white;
  cursor: pointer;
}

/* MENSAJE */
.msg {
  margin-top: 12px;
  font-size: 0.9rem;
  min-height: 18px;
}

.error {
  color: #fb7185;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  body {
    align-items: flex-start;
    padding: 20px;
  }

  .container {
    background: transparent;
    border: none;
    box-shadow: none;
    backdrop-filter: none;
    padding: 0;
  }

  /* 🔥 BAJAR LOGO (LO IMPORTANTE QUE PEDISTE) */
  .logo {
    margin-top: 70px;
    margin-bottom: 20px;
  }

  .top-link {
    top: 15px;
  }

}
</style>
</head>

<body>

<a class="top-link" href="https://www.chesttop.com">
← Ver otras plataformas
</a>

<div class="container">

  <img src="/assets/LogoTop.png" class="logo">

  <h1>Acceso Privado</h1>
  <p>Ingresa la clave secreta de 6 dígitos</p>

  <form id="form">
    <input id="input" class="input" maxlength="6" placeholder="000000">
    <button class="btn">Acceder</button>
  </form>

  <div id="msg" class="msg"></div>

  <!-- BOTON WHATSAPP (PC + MOBILE) -->
  <button class="btn-wsp" onclick="goWhatsApp()">
    📲 Escríbenos: +51 904 293 916
  </button>

</div>

<script>
const MAX_ATTEMPTS = 10;
const ATTEMPTS_KEY = 'attempts';
const ACCESS_KEY = 'access_exp';
const ACCESS_HOURS = 12;

function peruNow(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Lima'}));
}

function generateCode(){
  const now = peruNow();
  const d = now.getDate();
  const m = now.getMonth()+1;
  const y = now.getFullYear();

  let val = Math.pow(d+m,2)*y;
  let code = String(val);

  if(code.length > 6) code = code.slice(0,6);
  if(code.length < 6) code = code.padEnd(6,'0');

  return code;
}

function getAttempts(){ return Number(localStorage.getItem(ATTEMPTS_KEY)||0); }
function setAttempts(v){ localStorage.setItem(ATTEMPTS_KEY,v); }
function resetAttempts(){ localStorage.removeItem(ATTEMPTS_KEY); }

function grantAccess(){
  const exp = Date.now() + ACCESS_HOURS*3600000;
  localStorage.setItem(ACCESS_KEY, exp);
  window.location.href = "player.html";
}

document.getElementById('form').addEventListener('submit', e=>{
  e.preventDefault();

  let attempts = getAttempts();
  const msg = document.getElementById('msg');

  if(attempts >= MAX_ATTEMPTS){
    msg.textContent = "Demasiados intentos. Intenta más tarde.";
    msg.classList.add('error');
    return;
  }

  const entered = document.getElementById('input').value.replace(/\D/g,'').slice(0,6);
  const expected = generateCode();

  if(entered === expected){
    resetAttempts();
    grantAccess();
  } else {
    attempts++;
    setAttempts(attempts);
    let left = MAX_ATTEMPTS - attempts;
    msg.textContent = `Clave incorrecta. Te quedan ${left} intentos`;
    msg.classList.add('error');
  }
});

document.getElementById('input').addEventListener('input', e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,6);
});

function goWhatsApp(){
  window.location.href = "https://wa.me/51904293916?text=Hola%20TopStreaming%20👋%20quisiera%20información%20sobre%20la%20transmisión%20en%20vivo%20🎬%20y%20el%20precio%20por%20favor.";
}

if(Number(localStorage.getItem(ACCESS_KEY)||0) > Date.now()){
  window.location.href = "player.html";
}
</script>

</body>
</html>
