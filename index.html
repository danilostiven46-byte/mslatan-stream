<!DOCTYPE html>
<html lang="es">
<head>
<link rel="icon" type="image/png" href="assets/faviconTop.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopStreaming | Acceso</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at top, rgba(225,29,72,0.25), transparent 40%),
    radial-gradient(circle at bottom, rgba(124,58,237,0.2), transparent 40%),
    #050505;
  color: white;
}

/* CONTENEDOR */
.container {
  width: 100%;
  max-width: 420px;
  padding: 28px;
  border-radius: 24px;
  background: rgba(15,15,15,0.85);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  text-align: center;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* LOGO */
.logo {
  width: 70px;
  margin-bottom: 16px;
}

/* TITULOS */
h1 {
  font-size: 1.8rem;
  margin-bottom: 6px;
}

p {
  color: #a1a1aa;
  font-size: 0.95rem;
}

/* INPUT */
.input {
  margin-top: 20px;
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: white;
  text-align: center;
  font-size: 1.3rem;
  letter-spacing: 0.4em;
  outline: none;
}

.input:focus {
  border-color: #e11d48;
  box-shadow: 0 0 0 4px rgba(225,29,72,0.2);
}

/* BOTON */
.btn {
  margin-top: 16px;
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #e11d48, #be123c);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  transform: translateY(-1px);
  opacity: 0.9;
}

/* MENSAJE */
.msg {
  margin-top: 12px;
  font-size: 0.9rem;
  min-height: 18px;
}

.error {
  color: #fb7185;
}
</style>
</head>

<body>

<div class="container">

  <img src="assets/LogoTop.png" class="logo">

  <h1>Acceso privado</h1>
  <p>Ingresa la clave diaria de 6 dígitos</p>

  <form id="form">
    <input id="input" class="input" maxlength="6" placeholder="000000">
    <button class="btn">Entrar</button>
  </form>

  <div id="msg" class="msg"></div>

</div>

<script>
const MAX_ATTEMPTS = 10;
const ATTEMPTS_KEY = 'attempts';
const ACCESS_KEY = 'access_exp';
const ACCESS_HOURS = 12;

/* PERU TIME */
function peruNow(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Lima'}));
}

/* CODIGO */
function generateCode(){
  const now = peruNow();
  const d = now.getDate();
  const m = now.getMonth()+1;
  const y = now.getFullYear();

  let val = Math.pow(d+m,2)*y;
  let code = String(val);

  if(code.length > 6) code = code.slice(0,6);
  if(code.length < 6) code = code.padEnd(6,'0');

  return code;
}

/* INTENTOS */
function getAttempts(){ return Number(localStorage.getItem(ATTEMPTS_KEY)||0); }
function setAttempts(v){ localStorage.setItem(ATTEMPTS_KEY,v); }
function resetAttempts(){ localStorage.removeItem(ATTEMPTS_KEY); }

/* ACCESO */
function grantAccess(){
  const exp = Date.now() + ACCESS_HOURS*3600000;
  localStorage.setItem(ACCESS_KEY, exp);
  window.location.href = "player.html";
}

/* FORM */
document.getElementById('form').addEventListener('submit', e=>{
  e.preventDefault();

  let attempts = getAttempts();
  const msg = document.getElementById('msg');

  if(attempts >= MAX_ATTEMPTS){
    msg.textContent = "Demasiados intentos. Intenta más tarde.";
    msg.classList.add('error');
    return;
  }

  const entered = document.getElementById('input').value.replace(/\D/g,'').slice(0,6);
  const expected = generateCode();

  if(entered === expected){
    resetAttempts();
    grantAccess();
  } else {
    attempts++;
    setAttempts(attempts);
    let left = MAX_ATTEMPTS - attempts;
    msg.textContent = `Clave incorrecta. Te quedan ${left} intentos`;
    msg.classList.add('error');
  }
});

/* SOLO NUMEROS */
document.getElementById('input').addEventListener('input', e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,6);
});

/* AUTO REDIRECT SI YA TIENE ACCESO */
if(Number(localStorage.getItem(ACCESS_KEY)||0) > Date.now()){
  window.location.href = "player.html";
}
</script>

</body>
</html>
