<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TopStreaming</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* (SE MANTIENE TODO TU CSS IGUAL, NO CAMBIA NADA) */
</style>
</head>

<body>

<!-- HEADER -->
<header class="desktop-header">
  <div class="desktop-header__inner">
    <div class="brand">
      <img src="./logo-topstreaming.png" class="brand__logo">
      <div class="brand__text">
        <h1>TopStreaming</h1>
        <p>Transmisión en vivo</p>
      </div>
    </div>
    <nav class="desktop-links">
      <a class="header-link" href="https://www.chesttop.com">Catálogo</a>
      <a class="header-link" href="https://wa.me/51904293916">WhatsApp</a>
    </nav>
  </div>
</header>

<!-- MAIN -->
<main class="page">

<div class="player-frame" id="playerFrame">
  <video id="video" controls></video>

  <!-- 🔐 GATE -->
  <div class="overlay-screen" id="gateScreen">
    <div class="overlay-card">
      <h2>Acceso privado</h2>
      <p>Ingresa la clave diaria de 6 dígitos</p>

      <form id="pinForm">
        <input id="pinInput" maxlength="6" placeholder="000000">
        <button type="submit">Entrar</button>
      </form>

      <div id="pinNotice"></div>
    </div>
  </div>

  <!-- 📡 OFFLINE -->
  <div class="overlay-screen" id="offlineScreen" hidden>
    <div class="overlay-card">
      <h2>No estamos en emisión</h2>
      <button onclick="location.reload()">Recargar</button>
    </div>
  </div>

</div>

</main>

<!-- 📱 NAV -->
<nav class="mobile-nav">
  <a href="https://www.chesttop.com">Productos</a>
  <a href="https://www.chesttop.com/portal">Mis cuentas</a>
</nav>

<script>
const STREAM_URL = 'https://stream.mslatan.xyz/hls/stream.m3u8';
const ACCESS_KEY = 'access_exp';
const ACCESS_HOURS = 12;

const MAX_ATTEMPTS = 10;
const ATTEMPTS_KEY = 'attempts';

const video = document.getElementById('video');
const gate = document.getElementById('gateScreen');
const offline = document.getElementById('offlineScreen');
const form = document.getElementById('pinForm');
const input = document.getElementById('pinInput');
const notice = document.getElementById('pinNotice');

let hls;
let streamReady = false;

/* 🧠 PERÚ TIME */
function peruNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Lima' }));
}

/* 🔐 CÓDIGO */
function generateCode() {
  const now = peruNow();
  const d = now.getDate();
  const m = now.getMonth()+1;
  const y = now.getFullYear();

  let val = Math.pow(d+m,2)*y;
  let code = String(val);

  if(code.length > 6) code = code.slice(0,6);
  if(code.length < 6) code = code.padEnd(6,'0');

  return code;
}

/* 🔁 INTENTOS */
function getAttempts(){ return Number(localStorage.getItem(ATTEMPTS_KEY)||0); }
function setAttempts(v){ localStorage.setItem(ATTEMPTS_KEY,v); }
function resetAttempts(){ localStorage.removeItem(ATTEMPTS_KEY); }

/* 🔓 ACCESO */
function grantAccess(){
  const exp = Date.now() + ACCESS_HOURS*3600000;
  localStorage.setItem(ACCESS_KEY, exp);
  gate.hidden = true;
  startPlayer();
}

function hasAccess(){
  return Number(localStorage.getItem(ACCESS_KEY)||0) > Date.now();
}

/* 🎥 PLAYER */
function startPlayer(){

  if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = STREAM_URL;
    video.play();
    return;
  }

  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(STREAM_URL);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=> video.play());
  }
}

/* 📡 OFFLINE */
video.addEventListener('error', ()=> offline.hidden = false);

/* 🔐 LOGIN */
form.addEventListener('submit', e=>{
  e.preventDefault();

  let attempts = getAttempts();

  if(attempts >= MAX_ATTEMPTS){
    notice.textContent = "Demasiados intentos. Intenta luego.";
    return;
  }

  const entered = input.value.replace(/\D/g,'').slice(0,6);
  const expected = generateCode();

  if(entered === expected){
    resetAttempts();
    notice.textContent = "";
    grantAccess();
  } else {
    attempts++;
    setAttempts(attempts);

    let left = MAX_ATTEMPTS - attempts;
    notice.textContent = `Clave incorrecta. Te quedan ${left} de ${MAX_ATTEMPTS}`;
  }
});

/* INIT */
if(hasAccess()){
  gate.hidden = true;
  startPlayer();
} else {
  gate.hidden = false;
}
</script>

</body>
</html>
