<!DOCTYPE html>
<html lang="es">
<head>
<link rel="icon" type="image/png" href="/assets/faviconTop.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopStreaming | Acceso</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at top left, rgba(16,185,129,0.25), transparent 40%),
    radial-gradient(circle at bottom right, rgba(59,130,246,0.25), transparent 40%),
    #020617;

  color: white;
}

/* HEADER */
.top-link {
  position: absolute;
  top: 18px;
  left: 20px;
  font-size: 0.9rem;
  color: #cbd5f5;
  text-decoration: none;
}

.top-link:hover {
  color: white;
}

/* CONTENEDOR */
.container {
  width: 100%;
  max-width: 420px;
  padding: 32px 26px;
  border-radius: 26px;

  background: rgba(10,15,25,0.45);
  backdrop-filter: blur(18px);

  border: 1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 30px 80px rgba(0,0,0,0.7),
    0 0 40px rgba(16,185,129,0.08);

  text-align: center;
}

/* LOGO */
.logo {
  width: 170px;
  margin-bottom: 10px;
}

/* TEXTOS */
h1 {
  font-size: 1.6rem;
  margin-bottom: 4px;
  font-weight: 700;
}

.sub {
  font-size: 0.85rem;
  color: #94a3b8;
  margin-bottom: 18px;
}

/* INPUT PRO */
.input {
  width: 100%;
  padding: 18px;
  border-radius: 18px;

  border: 1px solid rgba(255,255,255,0.15);

  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.08),
    rgba(255,255,255,0.02)
  );

  color: white;
  text-align: center;

  font-size: 1.6rem;
  letter-spacing: 0.5em;

  outline: none;
}

.input:focus {
  border-color: #10b981;
  box-shadow: 0 0 0 4px rgba(16,185,129,0.25);
}

/* BOTON */
.btn {
  margin-top: 18px;
  width: 100%;
  padding: 16px;

  border-radius: 16px;
  border: none;

  background: linear-gradient(135deg, #10b981, #3b82f6);

  color: white;
  font-weight: 700;
  font-size: 1rem;

  cursor: pointer;
}

/* CONTACTO */
.contact {
  margin-top: 20px;
  font-size: 0.85rem;
  color: #94a3b8;
}

.contact-btn {
  margin-top: 10px;
  display: block;
  width: 100%;
  padding: 12px;

  border-radius: 14px;
  text-decoration: none;

  border: 1px solid rgba(255,255,255,0.15);
  color: white;
}

/* MENSAJE */
.msg {
  margin-top: 10px;
  font-size: 0.9rem;
}

.error {
  color: #fb7185;
}
</style>
</head>

<body>

<a href="https://www.chesttop.com" class="top-link">← Ver otras plataformas</a>

<div class="container">

  <img src="/assets/LogoTop.png" class="logo">

  <h1>Ingresa la clave secreta</h1>
  <p class="sub">Acceso Privado Lives</p>

  <form id="form">
    <input id="input" class="input" maxlength="6" placeholder="000000">
    <button class="btn">ACCEDER</button>
  </form>

  <div id="msg" class="msg"></div>

  <div class="contact">
    ¿No tienes una clave?
    <a class="contact-btn" href="https://wa.me/51904293916?text=Hola%20TopStreaming%20👋%20quisiera%20información%20sobre%20la%20transmisión%20en%20vivo%20🎬%20y%20el%20precio%20por%20favor.">
      Contactar
    </a>
  </div>

</div>

<script>
const MAX_ATTEMPTS = 10;
const ATTEMPTS_KEY = 'attempts';
const ACCESS_KEY = 'access_exp';
const ACCESS_HOURS = 12;

function peruNow(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Lima'}));
}

function generateCode(){
  const now = peruNow();
  const d = now.getDate();
  const m = now.getMonth()+1;
  const y = now.getFullYear();

  let val = Math.pow(d+m,2)*y;
  let code = String(val);

  if(code.length > 6) code = code.slice(0,6);
  if(code.length < 6) code = code.padEnd(6,'0');

  return code;
}

function getAttempts(){ return Number(localStorage.getItem(ATTEMPTS_KEY)||0); }
function setAttempts(v){ localStorage.setItem(ATTEMPTS_KEY,v); }
function resetAttempts(){ localStorage.removeItem(ATTEMPTS_KEY); }

function grantAccess(){
  const exp = Date.now() + ACCESS_HOURS*3600000;
  localStorage.setItem(ACCESS_KEY, exp);
  window.location.href = "player.html";
}

document.getElementById('form').addEventListener('submit', e=>{
  e.preventDefault();

  let attempts = getAttempts();
  const msg = document.getElementById('msg');

  if(attempts >= MAX_ATTEMPTS){
    msg.textContent = "Demasiados intentos. Intenta más tarde.";
    msg.classList.add('error');
    return;
  }

  const entered = document.getElementById('input').value.replace(/\D/g,'').slice(0,6);
  const expected = generateCode();

  if(entered === expected){
    resetAttempts();
    grantAccess();
  } else {
    attempts++;
    setAttempts(attempts);
    let left = MAX_ATTEMPTS - attempts;
    msg.textContent = `Clave incorrecta. Te quedan ${left} intentos`;
    msg.classList.add('error');
  }
});

document.getElementById('input').addEventListener('input', e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,6);
});

if(Number(localStorage.getItem(ACCESS_KEY)||0) > Date.now()){
  window.location.href = "player.html";
}
</script>

</body>
</html>
