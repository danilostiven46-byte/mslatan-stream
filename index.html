<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopStreaming | Acceso</title>

<link rel="icon" href="/assets/faviconTop.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,0,0,0.25), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(180,0,0,0.2), transparent 50%),
    #020617;
  color:white;
}

/* 🔥 CONTENEDOR GLASS PRO */
.container{
  width:100%;
  max-width:420px;
  padding:30px;
  border-radius:24px;

  background:rgba(10,10,10,0.5); /* 👈 más transparente */
  backdrop-filter:blur(18px);

  border:1px solid rgba(255,70,70,0.25); /* 👈 borde rojo suave */

  box-shadow:
    0 25px 70px rgba(0,0,0,0.7),
    0 0 40px rgba(255,0,0,0.12); /* 👈 glow rojo */

  text-align:center;
}

/* LOGO */
.logo{
  width:150px;
  margin-bottom:18px;
  filter:drop-shadow(0 0 12px rgba(255,0,0,0.25));
}

/* TITULOS */
h2{
  font-size:1.2rem;
  margin-bottom:6px;
}

p{
  font-size:0.9rem;
  color:#a1a1aa;
}

/* INPUT */
.input{
  margin-top:20px;
  width:100%;
  padding:14px;
  border-radius:12px;

  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.04);

  color:white;
  text-align:center;

  font-size:1.3rem;
  letter-spacing:0.3em;

  outline:none;
}

.input:focus{
  border-color:#ef4444;
  box-shadow:
    0 0 10px rgba(239,68,68,0.25),
    0 0 20px rgba(239,68,68,0.15);
}

/* 🔴 BOTÓN PREMIUM REAL */
.btn{
  margin-top:16px;
  width:100%;
  padding:14px;

  border-radius:12px;
  border:none;

  background:
    linear-gradient(135deg,#ff1f1f,#7f1d1d);

  color:white;
  font-weight:600;

  cursor:pointer;

  box-shadow:
    0 10px 25px rgba(255,0,0,0.35),
    inset 0 0 12px rgba(255,255,255,0.08);

  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:
    0 15px 35px rgba(255,0,0,0.45),
    inset 0 0 14px rgba(255,255,255,0.12);
}

/* MENSAJE */
.msg{
  margin-top:10px;
  font-size:0.85rem;
  min-height:18px;
}

.error{
  color:#fb7185;
}
</style>
</head>

<body>

<div class="container">

  <img src="/assets/LogoTop.png" class="logo">

  <h2>Acceso privado</h2>
  <p>Ingresa la clave secreta de 6 dígitos</p>

  <form id="form">
    <input id="input" class="input" maxlength="6" placeholder="000000">
    <button class="btn">Acceder</button>
  </form>

  <div id="msg" class="msg"></div>

</div>

<script>
const MAX_ATTEMPTS = 10;
const ACCESS_KEY = "access_exp";
const ATTEMPTS_KEY = "attempts";
const ACCESS_HOURS = 12;

function peruNow(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Lima'}));
}

function generateCode(){
  const now = peruNow();
  const d = now.getDate();
  const m = now.getMonth()+1;
  const y = now.getFullYear();

  let val = Math.pow(d+m,2)*y;
  let code = String(val);

  if(code.length > 6) code = code.slice(0,6);
  if(code.length < 6) code = code.padEnd(6,'0');

  return code;
}

function grantAccess(){
  const exp = Date.now() + ACCESS_HOURS*3600000;
  localStorage.setItem(ACCESS_KEY, exp);
  window.location.href = "player.html";
}

document.getElementById("form").addEventListener("submit", e=>{
  e.preventDefault();

  let attempts = Number(localStorage.getItem(ATTEMPTS_KEY)||0);
  const msg = document.getElementById("msg");

  if(attempts >= MAX_ATTEMPTS){
    msg.textContent = "Demasiados intentos.";
    msg.classList.add("error");
    return;
  }

  const entered = document.getElementById("input").value.replace(/\D/g,'').slice(0,6);
  const expected = generateCode();

  if(entered === expected){
    localStorage.removeItem(ATTEMPTS_KEY);
    grantAccess();
  } else {
    attempts++;
    localStorage.setItem(ATTEMPTS_KEY, attempts);
    msg.textContent = `Te quedan ${MAX_ATTEMPTS - attempts} intentos`;
    msg.classList.add("error");
  }
});

document.getElementById("input").addEventListener("input", e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,6);
});

if(Number(localStorage.getItem(ACCESS_KEY)||0) > Date.now()){
  window.location.href = "player.html";
}
</script>

</body>
</html>
