<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso | TopStreaming</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* 🔥 TU FONDO (puedes dejar el tuyo actual) */
  background:
    radial-gradient(circle at top left, rgba(255,0,0,0.2), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,0,0,0.15), transparent 40%),
    #0b0b0b;
  color: white;
}

/* ================= PC / TV (CON CAJA) ================= */
.container {
  width: 380px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(20,20,20,0.85);
  backdrop-filter: blur(10px);
  text-align: center;
}

/* ================= MOBILE (SIN CAJA) ================= */
@media (max-width: 768px) {
  body {
    padding: 20px;
    align-items: flex-start;
  }

  .container {
    width: 100%;
    background: transparent;
    backdrop-filter: none;
    padding: 0;
  }
}

/* HEADER */
.top-link {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 14px;
  opacity: 0.8;
  text-decoration: none;
  color: white;
}

/* LOGO */
.logo {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 30px;
}

/* TEXTOS */
.title {
  font-size: 22px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 25px;
}

/* INPUT */
.input-box {
  width: 100%;
  padding: 18px;
  border-radius: 14px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 22px;
  letter-spacing: 8px;

  background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
  color: white;
  margin-bottom: 15px;
}

/* BOTÓN ACCEDER */
.btn-main {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, #ff0000, #ff3b3b);
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 25px;
  opacity: 0.6;
}

.btn-main.active {
  opacity: 1;
}

/* TEXTO FINAL */
.small-text {
  font-size: 14px;
  margin-bottom: 10px;
  opacity: 0.7;
}

/* BOTÓN WHATSAPP */
.btn-whatsapp {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #1f1f1f;
  color: white;
  cursor: pointer;
}

/* MOBILE BOTÓN TEXTO */
@media (max-width: 768px) {
  .btn-whatsapp {
    font-size: 14px;
  }
}

/* PC/TV TEXTO BOTÓN */
@media (min-width: 769px) {
  .btn-whatsapp {
    font-size: 15px;
  }
}
</style>
</head>

<body>

<a class="top-link" href="https://www.chesttop.com">
← Ver otras plataformas
</a>

<div class="container">

  <!-- LOGO -->
  <div class="logo">TOPSTREAMING</div>

  <!-- TEXTOS -->
  <div class="title">Ingresa la clave secreta de 6 dígitos</div>
  <div class="subtitle">Acceso Privado Lives</div>

  <!-- INPUT -->
  <input 
    type="text" 
    maxlength="6" 
    class="input-box" 
    id="codeInput"
    placeholder="000000"
    inputmode="numeric"
  >

  <!-- BOTÓN -->
  <button class="btn-main" id="accessBtn">
    ACCEDER
  </button>

  <!-- CONTACTO -->
  <div class="small-text">¿No tienes una clave?</div>

  <button class="btn-whatsapp" onclick="goWhatsApp()">
    📲 Escríbenos: +51 904 293 916
  </button>

</div>

<script>
// INPUT SOLO NÚMEROS
const input = document.getElementById("codeInput");
const btn = document.getElementById("accessBtn");

input.addEventListener("input", () => {
  input.value = input.value.replace(/\D/g, '');

  if (input.value.length === 6) {
    btn.classList.add("active");
  } else {
    btn.classList.remove("active");
  }
});

// CLICK ACCEDER (AQUÍ CONECTAS TU LÓGICA REAL)
btn.addEventListener("click", () => {
  if (input.value.length !== 6) return;

  alert("Aquí va tu validación real");
});

// WHATSAPP
function goWhatsApp() {
  window.location.href = "https://wa.me/51904293916?text=Hola%20TopStreaming%20👋%20quisiera%20información%20sobre%20la%20transmisión%20en%20vivo%20🎬%20y%20el%20precio%20por%20favor.";
}
</script>

</body>
</html>
