<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopStreaming | Acceso</title>

<link rel="icon" href="/assets/faviconTop.png">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

/* 🔥 FONDO PREMIUM */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,0,0,0.25), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(180,0,0,0.2), transparent 50%),
    #020617;
  color:white;
}

/* 💎 CONTENEDOR GLASS */
.container{
  width:100%;
  max-width:420px;
  padding:36px 28px;
  border-radius:26px;

  background:rgba(10,10,10,0.65);
  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 30px 80px rgba(0,0,0,0.8),
    0 0 40px rgba(239,68,68,0.08);

  text-align:center;

  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1; transform:translateY(0);}
}

/* 🔴 LOGO */
.logo{
  width:150px;
  margin-bottom:22px;
  filter:drop-shadow(0 0 12px rgba(239,68,68,0.25));
}

/* TITULO */
h1{
  font-size:1.5rem;
  margin-bottom:10px;
  font-weight:600;
}

/* INPUT */
.input{
  margin-top:22px;
  width:100%;
  padding:16px;
  border-radius:14px;

  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.04);

  color:white;
  text-align:center;

  font-size:1.4rem;
  letter-spacing:0.35em;

  outline:none;

  transition:.25s;
}

.input:focus{
  border-color:#ef4444;
  box-shadow:
    0 0 0 3px rgba(239,68,68,0.15),
    0 0 12px rgba(239,68,68,0.25);
}

/* 🔥 BOTÓN PREMIUM */
.btn{
  margin-top:16px;
  width:100%;
  padding:14px;

  border-radius:14px;
  border:none;

  background:linear-gradient(135deg,#ef4444,#991b1b);

  color:white;
  font-weight:600;
  font-size:0.95rem;

  cursor:pointer;

  box-shadow:
    0 10px 25px rgba(239,68,68,0.25),
    inset 0 0 10px rgba(255,255,255,0.05);

  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:
    0 15px 35px rgba(239,68,68,0.35),
    inset 0 0 12px rgba(255,255,255,0.08);
}

/* MENSAJE */
.msg{
  margin-top:14px;
  font-size:0.9rem;
  min-height:18px;
}

.error{
  color:#fb7185;
}
</style>
</head>

<body>

<div class="container">

  <img src="/assets/LogoTop.png" class="logo">

  <h1>Ingresa la clave secreta de 6 dígitos</h1>

  <form id="form">
    <input id="input" class="input" maxlength="6" placeholder="000000">
    <button class="btn">Acceder</button>
  </form>

  <div id="msg" class="msg"></div>

</div>

<script>
const MAX_ATTEMPTS = 10;
const ACCESS_KEY = "access_exp";
const ATTEMPTS_KEY = "attempts";
const ACCESS_HOURS = 12;

/* 🕒 Hora Perú */
function peruNow(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Lima'}));
}

/* 🔢 Código dinámico */
function generateCode(){
  const now = peruNow();
  const d = now.getDate();
  const m = now.getMonth()+1;
  const y = now.getFullYear();

  let val = Math.pow(d+m,2)*y;
  let code = String(val);

  if(code.length > 6) code = code.slice(0,6);
  if(code.length < 6) code = code.padEnd(6,'0');

  return code;
}

/* INTENTOS */
function getAttempts(){
  return Number(localStorage.getItem(ATTEMPTS_KEY)||0);
}

function setAttempts(v){
  localStorage.setItem(ATTEMPTS_KEY,v);
}

function resetAttempts(){
  localStorage.removeItem(ATTEMPTS_KEY);
}

/* ACCESO */
function grantAccess(){
  const exp = Date.now() + ACCESS_HOURS*3600000;
  localStorage.setItem(ACCESS_KEY, exp);
  window.location.href = "player.html";
}

/* FORM */
document.getElementById("form").addEventListener("submit", e=>{
  e.preventDefault();

  let attempts = getAttempts();
  const msg = document.getElementById("msg");

  if(attempts >= MAX_ATTEMPTS){
    msg.textContent = "Demasiados intentos. Intenta más tarde.";
    msg.classList.add("error");
    return;
  }

  const entered = document.getElementById("input").value.replace(/\D/g,'').slice(0,6);
  const expected = generateCode();

  if(entered === expected){
    resetAttempts();
    grantAccess();
  } else {
    attempts++;
    setAttempts(attempts);
    const left = MAX_ATTEMPTS - attempts;
    msg.textContent = `Clave incorrecta. Te quedan ${left} intentos`;
    msg.classList.add("error");
  }
});

/* SOLO NÚMEROS */
document.getElementById("input").addEventListener("input", e=>{
  e.target.value = e.target.value.replace(/\D/g,'').slice(0,6);
});

/* AUTO REDIRECT */
if(Number(localStorage.getItem(ACCESS_KEY)||0) > Date.now()){
  window.location.href = "player.html";
}
</script>

</body>
</html>
