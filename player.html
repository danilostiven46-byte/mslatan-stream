<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopStreaming</title>

<link rel="icon" href="/assets/faviconTop.png">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

/* 🔥 FONDO ROJO PRO */
body{
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,0,0,0.25), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(180,0,0,0.2), transparent 50%),
    #020617;
  background-attachment:fixed;
  color:white;
}

/* ===== HEADER ===== */
.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
  z-index:10;
}

.left{
  display:flex;
  align-items:center;
  gap:30px;
}

.logo{
  height:46px;
}

.nav{
  display:flex;
  gap:24px;
}

.nav a{
  text-decoration:none;
  color:#e5e7eb;
  font-weight:500;
  transition:.3s;
}

.nav a:hover{
  color:#ef4444;
}

/* BOTON RECARGAR */
.btn-main{
  padding:10px 18px;
  border-radius:14px;
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* ===== PLAYER ===== */
.main{
  padding-top:80px;
  display:flex;
  justify-content:center;
}

.player-wrap{
  width:95%;
}

.player{
  width:100%;
  height:80vh;
  background:black;
  border-radius:16px;
  overflow:hidden;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .header{
    justify-content:center;
    height:100px;
  }

  .left{
    flex-direction:column;
    gap:6px;
  }

  .logo{
    height:80px;
  }

  .nav{
    display:none;
  }

  .btn-main{
    display:none;
  }

  .main{
    padding-top:120px;
    padding-bottom:80px;
  }

  .player{
    height:50vh;
    border-radius:18px;

    /* 🔥 BORDE ROJO PRO */
    border:1.5px solid rgba(239,68,68,0.6);
    box-shadow:
      0 0 25px rgba(239,68,68,0.25),
      0 20px 40px rgba(0,0,0,0.6);
  }
}

/* ===== NAV MOBILE NEGRO ROJIZO ===== */
.bottomNav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:#140808;
  border-top:1px solid rgba(255,0,0,0.15);
}

.bottomNav a{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  color:#e5e7eb;
  text-decoration:none;
}

/* ===== OCULTAR EN PC ===== */
@media(min-width:769px){
  .bottomNav{display:none;}
}

/* ===== TV MODE ===== */
.tv body{
  background:black;
}

.tv .header,
.tv .bottomNav,
.tv .main{
  display:none !important;
}

.tv video{
  width:100vw;
  height:100vh;
  object-fit:cover;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="left">
    <img src="/assets/LogoTop.png" class="logo">

    <div class="nav">
      <a href="https://www.chesttop.com">Productos</a>
      <a href="https://www.chesttop.com/portal">Mis cuentas</a>
    </div>
  </div>

  <div class="btn-main" onclick="location.reload()">Recargar</div>
</div>

<!-- PLAYER -->
<div class="main">
  <div class="player-wrap">
    <div class="player">
      <video id="video" controls playsinline webkit-playsinline></video>
    </div>
  </div>
</div>

<!-- NAV MOBILE -->
<nav class="bottomNav">
  <a href="https://www.chesttop.com">🛍️<span>Productos</span></a>
  <a href="https://www.chesttop.com/portal">👤<span>Mis cuentas</span></a>
  <a href="https://www.justwatch.com/pe">🍿<span>Películas</span></a>
  <a href="https://wa.me/51904293916">💬<span>Contacto</span></a>
</nav>

<script>
const STREAM = "https://stream.mslatan.xyz/hls/stream.m3u8";
const video = document.getElementById("video");

/* 🔐 protección */
const exp = localStorage.getItem("access_exp");
if(!exp || Date.now() > Number(exp)){
  window.location.href = "index.html";
}

/* 📺 detectar TV */
const isTV = /smart-tv|smarttv|googletv|appletv|hbbtv|tizen|webos|roku|android tv/i.test(navigator.userAgent);
if(isTV){
  document.documentElement.classList.add("tv");
}

/* 🎥 iniciar video */
function start(){

  if(video.canPlayType("application/vnd.apple.mpegurl")){
    video.src = STREAM;
    video.play().catch(()=>fallback());
    return;
  }

  if(Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(STREAM);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      video.play().catch(()=>fallback());
    });
  }
}

function fallback(){
  video.muted = true;
  video.play().catch(()=>{});
}

start();
</script>

</body>
</html>
