<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopStreaming | En vivo</title>

<link rel="icon" href="/assets/faviconTop.png">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  background:
    radial-gradient(circle at top left, rgba(16,185,129,0.15), transparent 40%),
    radial-gradient(circle at bottom right, rgba(59,130,246,0.15), transparent 40%),
    #020617;
  color:white;
}

/* HEADER PC */
.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 24px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  z-index:10;
}

.logo{
  height:40px;
}

.menu{
  display:flex;
  gap:10px;
}

.btn-top{
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  text-decoration:none;
}

.btn-top.green{
  background:linear-gradient(135deg,#10b981,#059669);
  border:none;
}

/* CONTENIDO */
.main{
  padding-top:90px;
  display:flex;
  justify-content:center;
}

.player-wrap{
  width:100%;
  max-width:1100px;
  padding:0 16px;
}

.player{
  width:100%;
  aspect-ratio:16/9;
  background:black;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* MOBILE */
@media(max-width:768px){

  .header{
    height:60px;
    justify-content:center;
  }

  .menu{
    display:none;
  }

  .main{
    padding-top:70px;
  }

  .player-wrap{
    padding:0;
  }

  .player{
    border-radius:0;
  }
}

/* BOTTOM NAV */
.bottomNav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:rgba(10,15,25,0.95);
  backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,0.08);
}

.bottomNav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  color:#cbd5f5;
  text-decoration:none;
}

.bottomNav-icon{
  font-size:18px;
}

/* PC ocultar nav */
@media(min-width:769px){
  .bottomNav{display:none;}
}

/* TV MODE */
.tv body{
  background:black;
}

.tv .header,
.tv .bottomNav,
.tv .main{
  display:none !important;
}

.tv video{
  width:100vw;
  height:100vh;
  object-fit:cover;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="/assets/LogoTop.png" class="logo">

  <div class="menu">
    <a href="https://www.chesttop.com/portal" class="btn-top">Portal Clientes</a>
    <a href="https://wa.me/51904293916" class="btn-top green">WhatsApp</a>
    <a href="https://www.justwatch.com/pe" class="btn-top">Películas</a>
    <a href="#" onclick="location.reload()" class="btn-top">Actualizar</a>
  </div>
</div>

<!-- PLAYER -->
<div class="main">
  <div class="player-wrap">
    <div class="player">
      <video id="video" playsinline controls></video>
    </div>
  </div>
</div>

<!-- NAV MOBILE -->
<nav class="bottomNav">
  <a href="https://www.chesttop.com" class="bottomNav-item">
    <span class="bottomNav-icon">🛍️</span>
    <span>Productos</span>
  </a>

  <a href="https://www.chesttop.com/portal" class="bottomNav-item">
    <span class="bottomNav-icon">👤</span>
    <span>Mis cuentas</span>
  </a>

  <a href="https://www.justwatch.com/pe" class="bottomNav-item">
    <span class="bottomNav-icon">🍿</span>
    <span>Películas</span>
  </a>

  <a href="https://wa.me/51904293916" class="bottomNav-item">
    <span class="bottomNav-icon">💬</span>
    <span>Contacto</span>
  </a>
</nav>

<script>
const STREAM = "https://stream.mslatan.xyz/hls/stream.m3u8";
const ACCESS_KEY = "access_exp";
const video = document.getElementById("video");

/* 🔐 PROTECCIÓN */
if(Number(localStorage.getItem(ACCESS_KEY)||0) < Date.now()){
  window.location.href = "index.html";
}

/* 📺 DETECTAR TV */
const isTV = /smart-tv|smarttv|googletv|appletv|hbbtv|tizen|webos|netcast|viera|roku|android tv/i.test(navigator.userAgent);

if(isTV){
  document.documentElement.classList.add("tv");
}

/* 🎥 PLAYER (FIX TV) */
function start(){

  /* 🔥 intento nativo primero (clave TV) */
  if(video.canPlayType("application/vnd.apple.mpegurl")){
    video.src = STREAM;
    video.muted = true;
    video.play().catch(()=>{});
    return;
  }

  /* 🔥 fallback HLS.js */
  if(Hls.isSupported()){
    const hls = new Hls({
      lowLatencyMode:true
    });
    hls.loadSource(STREAM);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      video.muted = true;
      video.play().catch(()=>{});
    });
  }
}

start();

/* activar sonido al interactuar */
video.addEventListener("click", ()=>{
  video.muted = false;
});
</script>

</body>
</html>
